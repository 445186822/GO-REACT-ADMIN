openapi: 3.1.0
info:
  title: Enterprise Demo API
  version: 0.2.0
servers:
  - url: http://localhost:8080/api/v1
security:
  - bearerAuth: []
paths:
  /health:
    get:
      security: []
      summary: Health check
      responses:
        "200":
          description: OK
  /auth/login:
    post:
      security: []
      summary: Login with a real database user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login response
  /auth/refresh:
    post:
      security: []
      summary: Refresh access token
      responses:
        "200":
          description: New access token
  /auth/me:
    get:
      summary: Current user, permissions, and menu tree
      responses:
        "200":
          description: Current user
  /users:
    get:
      summary: List users
      responses:
        "200":
          description: Paged users
    post:
      summary: Create user
      responses:
        "201":
          description: Created user ID
  /users/{id}:
    put:
      summary: Update user
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Soft delete user
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /roles:
    get:
      summary: List roles
      responses:
        "200":
          description: Roles
  /menus:
    get:
      summary: List menus and permissions
      responses:
        "200":
          description: Menus
  /departments:
    get:
      summary: List departments
      responses:
        "200":
          description: Departments
  /customers:
    get:
      summary: List customers with data-scope filtering
      responses:
        "200":
          description: Paged customers
    post:
      summary: Create customer
      responses:
        "201":
          description: Created customer ID
  /customers/export:
    post:
      summary: Export customers as backend-generated XLSX
      responses:
        "200":
          description: XLSX file stream
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
  /customers/{id}:
    put:
      summary: Update customer
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Soft delete customer
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /files:
    get:
      summary: List uploaded files
      responses:
        "200":
          description: Paged files
  /files/upload:
    post:
      summary: Upload a file to configured local storage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Created file ID
  /files/{id}/download:
    get:
      summary: Download file
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: File stream
  /files/{id}:
    delete:
      summary: Soft delete file metadata
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /audit-logs:
    get:
      summary: List persisted audit logs
      responses:
        "200":
          description: Paged audit logs
  /audit-logs/{id}:
    get:
      summary: Get audit log detail
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Audit log
  /settings:
    get:
      summary: List system settings
      parameters:
        - name: group_key
          in: query
          schema:
            type: string
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Settings
  /settings/{key}:
    put:
      summary: Create or update a system setting
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Setting ID
  /kb/categories:
    get:
      summary: List knowledge categories
      responses:
        "200":
          description: Categories
    post:
      summary: Create knowledge category
      responses:
        "201":
          description: Created category ID
  /kb/categories/{id}:
    put:
      summary: Update knowledge category
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete an unused knowledge category
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
        "409":
          description: Category has child categories, articles, or FAQs
  /kb/articles:
    get:
      summary: List knowledge articles
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - name: category_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paged articles
    post:
      summary: Create knowledge article
      responses:
        "201":
          description: Created article ID
  /kb/articles/{id}:
    get:
      summary: Get knowledge article and increment views
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Article
    put:
      summary: Update knowledge article
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Soft delete knowledge article
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /kb/faqs:
    get:
      summary: List knowledge FAQs
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - name: category_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paged FAQs
    post:
      summary: Create knowledge FAQ
      responses:
        "201":
          description: Created FAQ ID
  /message-templates:
    get:
      summary: List message templates with backend filtering
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Message templates
  /approval/templates:
    get:
      summary: List approval templates with backend filtering
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - name: biz_type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Approval templates
  /approval/instances:
    get:
      summary: List approval instances with backend filtering
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - name: biz_type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Approval instances
    post:
      summary: Submit approval instance
      responses:
        "201":
          description: Created approval instance ID
  /approval/instances/{id}/action:
    post:
      summary: Approve or reject an approval instance
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated approval status
  /workflows:
    get:
      summary: List workflows with backend filtering
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Workflows
  /ai-assistant/messages:
    get:
      summary: List current user's persisted AI assistant messages
      responses:
        "200":
          description: AI assistant messages
  /ai-assistant/chat:
    post:
      summary: Send one message to the configured AI assistant provider and persist the reply
      responses:
        "200":
          description: AI assistant reply
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
  schemas:
    ApiResponse:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
        message:
          type: string
        data:
          nullable: true
        request_id:
          type: string
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
