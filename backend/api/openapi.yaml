openapi: 3.1.0
info:
  title: Enterprise Demo API
  version: 0.2.0
servers:
  - url: http://localhost:8080/api/v1
security:
  - bearerAuth: []
paths:
  /health:
    get:
      security: []
      summary: Health check
      responses:
        "200":
          description: OK
  /auth/login:
    post:
      security: []
      summary: Login with a real database user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login response
  /auth/refresh:
    post:
      security: []
      summary: Refresh access token
      responses:
        "200":
          description: New access token
  /auth/captcha:
    get:
      security: []
      summary: Get slider captcha challenge
      responses:
        "200":
          description: Captcha challenge
  /auth/captcha/verify:
    post:
      security: []
      summary: Verify slider captcha challenge
      responses:
        "200":
          description: Captcha verification token
  /auth/me:
    get:
      summary: Current user, permissions, and menu tree
      responses:
        "200":
          description: Current user
  /auth/password:
    put:
      summary: Change current user's password
      responses:
        "200":
          description: Password changed
  /users:
    get:
      summary: List users
      responses:
        "200":
          description: Paged users
    post:
      summary: Create user
      responses:
        "201":
          description: Created user ID
  /users/{id}:
    put:
      summary: Update user
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Soft delete user
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /users/{id}/reset-password:
    put:
      summary: Reset a user's password
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Password reset
  /roles:
    get:
      summary: List roles
      responses:
        "200":
          description: Roles
    post:
      summary: Create role
      responses:
        "201":
          description: Created role ID
  /roles/{id}:
    put:
      summary: Update role
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Soft delete role
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /roles/{id}/menus:
    get:
      summary: List role menu IDs
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Role menu IDs
    put:
      summary: Update role menus
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
  /menus:
    get:
      summary: List menus and permissions
      responses:
        "200":
          description: Menus
  /departments:
    get:
      summary: List departments
      responses:
        "200":
          description: Departments
  /customers:
    get:
      summary: List customers with data-scope filtering
      responses:
        "200":
          description: Paged customers
    post:
      summary: Create customer
      responses:
        "201":
          description: Created customer ID
  /customers/export:
    post:
      summary: Export customers as backend-generated XLSX
      responses:
        "200":
          description: XLSX file stream
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
  /customers/import:
    post:
      summary: Import customers from an XLSX file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Import result with success and row-level failures
  /customers/{id}:
    put:
      summary: Update customer
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Soft delete customer
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /files:
    get:
      summary: List uploaded files
      responses:
        "200":
          description: Paged files
  /files/upload:
    post:
      summary: Upload a file to configured local storage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Created file ID
  /files/{id}/download:
    get:
      summary: Download file
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: File stream
  /files/{id}:
    delete:
      summary: Soft delete file metadata
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /audit-logs:
    get:
      summary: List persisted audit logs
      responses:
        "200":
          description: Paged audit logs
  /audit-logs/{id}:
    get:
      summary: Get audit log detail
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Audit log
  /settings:
    get:
      summary: List system settings
      parameters:
        - name: group_key
          in: query
          schema:
            type: string
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Settings
  /settings/{key}:
    put:
      summary: Create or update a system setting
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Setting ID
  /dashboard/stats:
    get:
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
  /monitor/overview:
    get:
      summary: Get system monitor overview
      responses:
        "200":
          description: Monitor overview
  /monitor/db-stats:
    get:
      summary: Get database monitor statistics
      responses:
        "200":
          description: Database statistics
  /dict/types:
    get:
      summary: List dictionary types
      responses:
        "200":
          description: Dictionary types
    post:
      summary: Create dictionary type
      responses:
        "201":
          description: Created type ID
  /dict/types/tree:
    get:
      summary: Get dictionary type tree
      responses:
        "200":
          description: Dictionary type tree
  /dict/types/{id}:
    put:
      summary: Update dictionary type
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete dictionary type
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /dict/types/{id}/items:
    get:
      summary: List dictionary items
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Dictionary items
    post:
      summary: Create dictionary item
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "201":
          description: Created item ID
  /dict/items/{id}:
    put:
      summary: Update dictionary item
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete dictionary item
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /dict/items/batch-sort:
    put:
      summary: Batch sort dictionary items
      responses:
        "200":
          description: Sorted
  /recycle-bin:
    get:
      summary: List recycled records
      responses:
        "200":
          description: Recycled records
    delete:
      summary: Purge all recycled records
      responses:
        "200":
          description: Purged
  /recycle-bin/{id}:
    delete:
      summary: Purge one recycled record
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Purged
  /recycle-bin/{id}/restore:
    post:
      summary: Restore one recycled record
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Restored
  /scheduler/tasks:
    get:
      summary: List scheduler tasks
      responses:
        "200":
          description: Scheduler tasks
    post:
      summary: Create scheduler task
      responses:
        "201":
          description: Created task ID
  /scheduler/tasks/{id}:
    put:
      summary: Update scheduler task
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete scheduler task
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /scheduler/tasks/{id}/toggle:
    post:
      summary: Toggle scheduler task
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Task enabled state
  /scheduler/tasks/{id}/run:
    post:
      summary: Run scheduler task immediately
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Run result
  /scheduler/tasks/{id}/executions:
    get:
      summary: List scheduler task executions
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Task executions
  /kb/categories:
    get:
      summary: List knowledge categories
      responses:
        "200":
          description: Categories
    post:
      summary: Create knowledge category
      responses:
        "201":
          description: Created category ID
  /kb/categories/{id}:
    put:
      summary: Update knowledge category
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete an unused knowledge category
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
        "409":
          description: Category has child categories, articles, or FAQs
  /kb/categories/tree:
    get:
      summary: Get knowledge category tree
      responses:
        "200":
          description: Category tree
  /kb/articles:
    get:
      summary: List knowledge articles
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - name: category_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paged articles
    post:
      summary: Create knowledge article
      responses:
        "201":
          description: Created article ID
  /kb/articles/{id}:
    get:
      summary: Get knowledge article and increment views
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Article
    put:
      summary: Update knowledge article
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Soft delete knowledge article
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /kb/faqs:
    get:
      summary: List knowledge FAQs
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - name: category_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paged FAQs
    post:
      summary: Create knowledge FAQ
      responses:
        "201":
          description: Created FAQ ID
  /kb/faqs/{id}:
    put:
      summary: Update knowledge FAQ
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Soft delete knowledge FAQ
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /todos:
    get:
      summary: List current user's todos
      responses:
        "200":
          description: Todos
  /notifications:
    get:
      summary: List notifications
      responses:
        "200":
          description: Notifications
    post:
      summary: Create notification
      responses:
        "201":
          description: Created notification ID
  /notifications/unread-count:
    get:
      summary: Get unread notification count
      responses:
        "200":
          description: Unread count
  /notifications/{id}/read:
    put:
      summary: Mark notification as read
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Marked read
  /notifications/read-all:
    put:
      summary: Mark all notifications as read
      responses:
        "200":
          description: Marked read
  /notifications/ws:
    get:
      summary: Notification websocket endpoint
      responses:
        "101":
          description: WebSocket upgrade
  /chat/sessions:
    get:
      summary: List chat sessions
      responses:
        "200":
          description: Chat sessions
    post:
      summary: Create chat session
      responses:
        "201":
          description: Created session ID
  /chat/sessions/{id}:
    get:
      summary: Get chat session detail
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Chat session
    put:
      summary: Update chat session
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
  /chat/sessions/{id}/messages:
    get:
      summary: List chat messages
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Chat messages
    post:
      summary: Send chat message
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "201":
          description: Created message
  /chat/sessions/{id}/messages/{message_id}/revoke:
    post:
      summary: Revoke chat message
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: message_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Revoked
  /chat/sessions/{id}/read:
    put:
      summary: Mark chat session as read
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Marked read
  /chat/sessions/{id}/settings:
    put:
      summary: Update chat session settings
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
  /chat/sessions/{id}/participants:
    post:
      summary: Add chat session participants
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Added
  /chat/sessions/{id}/participants/{user_id}:
    delete:
      summary: Remove chat session participant
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Removed
  /chat/users:
    get:
      summary: Search users for chat
      responses:
        "200":
          description: Users
  /chat/ws:
    get:
      summary: Chat websocket endpoint
      responses:
        "101":
          description: WebSocket upgrade
  /message-templates:
    get:
      summary: List message templates with backend filtering
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Message templates
    post:
      summary: Create message template
      responses:
        "201":
          description: Created template ID
  /message-templates/{id}:
    put:
      summary: Update message template
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete message template
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /approval/instances:
    get:
      summary: List approval instances with backend filtering
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - name: biz_type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Approval instances
    post:
      summary: Submit approval instance
      responses:
        "201":
          description: Created approval instance ID
  /approval/instances/{id}:
    get:
      summary: Get approval instance detail
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Approval instance
  /approval/instances/{id}/action:
    post:
      summary: Approve or reject an approval instance
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated approval status
  /workflows:
    get:
      summary: List workflows with backend filtering
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Workflows
    post:
      summary: Create workflow
      responses:
        "201":
          description: Created workflow ID
  /workflows/{id}:
    put:
      summary: Update workflow
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete workflow
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted
  /workflows/{id}/run:
    post:
      summary: Run workflow
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Workflow run result
  /workflows/instances:
    get:
      summary: List workflow instances
      responses:
        "200":
          description: Workflow instances
  /workflows/instances/{id}:
    get:
      summary: Get workflow instance detail
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Workflow instance
  /ai-assistant/messages:
    get:
      summary: List current user's persisted AI assistant messages
      responses:
        "200":
          description: AI assistant messages
  /ai-assistant/chat:
    post:
      summary: Send one message to the configured AI assistant provider and persist the reply
      responses:
        "200":
          description: AI assistant reply
  /ai/chat:
    post:
      summary: Stream chat completion from configured AI provider
      responses:
        "200":
          description: Server-sent event stream
  /ai/history:
    get:
      summary: List current user's streaming AI chat history
      responses:
        "200":
          description: AI chat history
  /queue-lab/kafka/concepts:
    get:
      summary: Get Kafka queue lab concepts
      responses:
        "200":
          description: Kafka concepts
  /queue-lab/kafka/topics:
    get:
      summary: List Kafka topics, partitions, and offsets for queue lab
      responses:
        "200":
          description: Kafka topic list with operation logs
    post:
      summary: Create or confirm a Kafka topic for queue lab
      responses:
        "200":
          description: Topic operation logs and result
    delete:
      summary: Delete a Kafka topic for queue lab cleanup
      parameters:
        - name: topic
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Topic deletion logs and result
  /queue-lab/kafka/messages:
    post:
      summary: Send a Kafka message for queue lab
      responses:
        "200":
          description: Send operation logs and result
  /queue-lab/kafka/consume:
    post:
      summary: Read Kafka messages by offset for queue lab
      responses:
        "200":
          description: Consume operation logs and messages
  /queue-lab/rabbitmq/concepts:
    get:
      summary: Get RabbitMQ queue lab concepts
      responses:
        "200":
          description: RabbitMQ concepts
  /queue-lab/rabbitmq/queues:
    get:
      summary: List RabbitMQ queues from the management API for queue lab
      responses:
        "200":
          description: RabbitMQ queue list with operation logs
    post:
      summary: Declare or confirm a RabbitMQ queue for queue lab
      responses:
        "200":
          description: Queue operation logs and result
    delete:
      summary: Delete a RabbitMQ queue for queue lab cleanup
      parameters:
        - name: queue
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Queue deletion logs and result
  /queue-lab/rabbitmq/exchanges:
    get:
      summary: List RabbitMQ exchanges from the management API for queue lab
      responses:
        "200":
          description: RabbitMQ exchange list with operation logs
  /queue-lab/rabbitmq/messages:
    post:
      summary: Send a RabbitMQ message for queue lab
      responses:
        "200":
          description: Send operation logs and result
  /queue-lab/rabbitmq/consume:
    post:
      summary: Consume one RabbitMQ message for queue lab
      responses:
        "200":
          description: Consume operation logs and message
  /queue-lab/iot/{protocol}/concepts:
    get:
      summary: Get IoT protocol lab concepts for TCP, UDP, or MQTT
      parameters:
        - name: protocol
          in: path
          required: true
          schema:
            type: string
            enum: [tcp, udp, mqtt]
      responses:
        "200":
          description: IoT protocol concepts
  /queue-lab/iot/{protocol}/messages:
    post:
      summary: Simulate an IoT protocol message and bridge it to Kafka or RabbitMQ
      parameters:
        - name: protocol
          in: path
          required: true
          schema:
            type: string
            enum: [tcp, udp, mqtt]
      responses:
        "200":
          description: IoT bridge operation logs and broker delivery result
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
  schemas:
    ApiResponse:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
        message:
          type: string
        data:
          nullable: true
        request_id:
          type: string
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
